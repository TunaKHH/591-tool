<!DOCTYPE html>
<html>

<head>
  <title>SVG to PNG Converter</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .output {
      margin-top: 20px;
    }

    .icon {
      margin-bottom: 20px;
      border: 1px solid #ddd;
      background: #f9f9f9;
      padding: 10px;
    }

    h2 {
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>591 圖示產生器</h1>
  <p>這個頁面會自動生成並顯示 591 租屋過濾工具的擴充套件圖示。您可以右鍵點擊圖示並選擇「儲存圖片」來下載。</p>

  <div class="output">
    <div class="icon">
      <h2>icon16.png (16x16):</h2>
      <canvas id="canvas16" width="16" height="16"></canvas>
      <div>
        <button onclick="downloadIcon(16)">下載 icon16.png</button>
      </div>
    </div>

    <div class="icon">
      <h2>icon48.png (48x48):</h2>
      <canvas id="canvas48" width="48" height="48"></canvas>
      <div>
        <button onclick="downloadIcon(48)">下載 icon48.png</button>
      </div>
    </div>

    <div class="icon">
      <h2>icon128.png (128x128):</h2>
      <canvas id="canvas128" width="128" height="128"></canvas>
      <div>
        <button onclick="downloadIcon(128)">下載 icon128.png</button>
      </div>
    </div>
  </div>

  <script>
    // SVG 內容
    const svgContent = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="80" fill="#e53935"/>
  <g transform="translate(96, 96) scale(13.3)">
    <path fill="white" d="M1,11V21H11V11H1M3,19V13H9V19H3M21,3H13V9H21V3M19,7H15V5H19V7M21,11H13V21H21V11M19,19H15V13H19V19M11,3H3V9H11V3M9,7H5V5H9V7Z"/>
    <path fill="white" d="M 4.5,7 H 19.5 L 12,17 V 22 L 8,24 V 17 L 0.5,7 Z" transform="translate(35, 3) scale(0.6)" stroke="white" stroke-width="1"/>
  </g>
</svg>`;

    // 創建 SVG Blob URL
    const svgBlob = new Blob([svgContent], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(svgBlob);

    // 載入並渲染圖片
    const img = new Image();
    img.onload = function () {
      renderToCanvas(this, 16);
      renderToCanvas(this, 48);
      renderToCanvas(this, 128);
    };
    img.src = url;

    // 渲染到指定尺寸的 Canvas
    function renderToCanvas(img, size) {
      const canvas = document.getElementById(`canvas${size}`);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
    }

    // 下載圖示
    function downloadIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>

</html>
